<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ChrimsonOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cr:      #c41e3a;
  --cr-hi:   #e8294f;
  --cr-dim:  rgba(196,30,58,0.28);
  --cr-glow: rgba(232,41,79,0.18);
  --bg:      #070710;
  --panel:   rgba(10,10,20,0.88);
  --glass:   rgba(12,12,26,0.80);
  --glassf:  rgba(255,255,255,0.04);
  --tx:      #eeeef8;
  --tx2:     #8888aa;
  --bd:      rgba(196,30,58,0.22);
  --bdl:     rgba(255,255,255,0.07);
  --f-logo:  'Cinzel', serif;
  --f-ui:    'Cinzel', serif;
  --r:       14px;
  --bar:     54px;
  --amber:   #f0a500;
  --teal:    #00c87a;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  font-family: var(--f-ui);
  color: var(--tx);
  -webkit-user-select: none; user-select: none;
}

/* ── Background Video ── */
#bgVideo {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: 0;
}

/* ════════════════════ LOGIN ════════════════════ */
#loginScreen {
  position: fixed; inset: 0;
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
}
#loginBlur {
  position: absolute; inset: 0;
  backdrop-filter: blur(24px) brightness(0.45) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) brightness(0.45) saturate(1.2);
  z-index: 0;
}
.l-clock { position: relative; z-index: 1; text-align: center; }
.l-clock-time {
  font-family: var(--f-logo);
  font-size: 5.5rem; font-weight: 400;
  color: #fff;
  text-shadow: 0 0 60px rgba(232,41,79,0.35), 0 4px 24px rgba(0,0,0,0.6);
  line-height: 1; letter-spacing: 0.04em;
}
.l-clock-date {
  font-family: var(--f-logo);
  font-size: 0.7rem; letter-spacing: 0.28em;
  color: rgba(255,255,255,0.52);
  text-transform: uppercase; margin-top: 8px;
}
.l-card {
  position: relative; z-index: 1;
  background: var(--glass);
  border: 1px solid rgba(196,30,58,0.35);
  border-radius: 22px;
  padding: 44px 52px;
  min-width: 360px;
  text-align: center;
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  box-shadow: 0 0 100px var(--cr-glow), 0 24px 70px rgba(0,0,0,0.65);
}
.l-logo {
  font-family: var(--f-logo);
  font-size: 1.7rem; font-weight: 700;
  color: var(--cr-hi);
  letter-spacing: 0.18em;
  text-shadow: 0 0 30px rgba(232,41,79,0.6);
}
.l-tagline {
  font-family: var(--f-logo);
  font-size: 0.55rem; letter-spacing: 0.32em;
  color: var(--tx2); text-transform: uppercase;
  margin-bottom: 36px; margin-top: 4px;
}
.l-avatar {
  width: 68px; height: 68px; border-radius: 50%;
  background: linear-gradient(135deg, var(--cr) 0%, #1a1a30 100%);
  border: 2px solid var(--cr-dim);
  margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.9rem;
  box-shadow: 0 0 24px var(--cr-glow);
}
.l-user-label { font-family: var(--f-logo); font-size: 0.85rem; font-weight: 500; margin-bottom: 22px; color: #ddddf0; letter-spacing: 0.08em; }
.l-input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--bdl);
  border-radius: 10px;
  padding: 12px 16px;
  color: var(--tx);
  font-family: var(--f-logo); font-size: 0.78rem;
  letter-spacing: 0.06em;
  outline: none; margin-bottom: 10px;
  transition: border-color 0.2s;
  -webkit-user-select: text; user-select: text;
}
.l-input:focus { border-color: var(--cr); }
.l-input::placeholder { color: var(--tx2); }
.l-btn {
  width: 100%;
  background: var(--cr); border: none; border-radius: 10px;
  padding: 13px;
  color: #fff; font-family: var(--f-logo); font-size: 0.78rem; font-weight: 600;
  cursor: pointer; margin-top: 6px; letter-spacing: 0.1em;
  transition: background 0.2s, transform 0.1s;
}
.l-btn:hover { background: var(--cr-hi); }
.l-btn:active { transform: scale(0.98); }
.l-err { font-family: var(--f-logo); color: #ff7070; font-size: 0.65rem; margin-top: 8px; min-height: 16px; letter-spacing: 0.06em; }
#loginScreen.fade-out { animation: lOut 0.55s ease forwards; }
@keyframes lOut { to { opacity:0; pointer-events:none; } }

/* ════════════════════ DESKTOP ════════════════════ */
#desktop { position: fixed; inset: 0; z-index: 10; }
#deskClock {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none; z-index: 11;
}
.dc-time {
  font-family: var(--f-logo);
  font-size: 6rem; font-weight: 400;
  color: rgba(255,255,255,0.82);
  text-shadow: 0 0 80px var(--cr-glow), 0 6px 30px rgba(0,0,0,0.55);
  letter-spacing: 0.05em; line-height: 1;
}
.dc-date {
  font-family: var(--f-logo);
  font-size: 0.7rem; letter-spacing: 0.26em;
  color: rgba(255,255,255,0.42);
  text-transform: uppercase; margin-top: 10px;
}

/* ── Taskbar ── */
#taskbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--bar);
  background: rgba(6,6,14,0.88);
  backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
  border-top: 1px solid var(--bd);
  z-index: 999;
  display: flex; align-items: center;
  padding: 0 14px; gap: 8px;
}
.tb-apps-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--cr); border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.18s, transform 0.15s;
  flex-shrink: 0; color: #fff;
}
.tb-apps-btn:hover { background: var(--cr-hi); transform: scale(1.08); }
.tb-apps-btn svg { pointer-events: none; }
.tb-sep { width: 1px; height: 26px; background: var(--bd); margin: 0 2px; }
.tb-dock { display: flex; align-items: center; gap: 5px; flex: 1; }

/* ── Dock Buttons — now support custom images ── */
.dock-btn {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--glassf);
  border: 1px solid var(--bdl);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.18s, transform 0.18s;
  position: relative; overflow: hidden;
}
.dock-btn:hover { background: rgba(255,255,255,0.09); transform: translateY(-3px); }
.dock-btn.active::after {
  content: '';
  position: absolute; bottom: -8px; left: 50%;
  transform: translateX(-50%);
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--cr-hi);
}
/* Custom image inside dock button */
.dock-btn img {
  width: 22px; height: 22px;
  object-fit: contain; border-radius: 4px;
  pointer-events: none;
}
.dock-btn .dock-icon-emoji {
  font-size: 1.05rem; pointer-events: none;
}
.dock-tip {
  position: absolute; bottom: calc(100% + 10px); left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85); color: #fff;
  font-family: var(--f-logo);
  font-size: 0.58rem; padding: 4px 9px; border-radius: 6px;
  white-space: nowrap; opacity: 0; pointer-events: none;
  transition: opacity 0.15s; letter-spacing: 0.06em;
}
.dock-btn:hover .dock-tip { opacity: 1; }

.tb-tray {
  display: flex; align-items: center; gap: 10px;
  margin-left: auto; flex-shrink: 0;
  font-family: var(--f-logo);
  font-size: 0.6rem; color: var(--tx2);
}
.tray-item {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--bdl);
  border-radius: 8px; padding: 4px 8px;
  transition: background 0.15s;
}
.tray-item:hover { background: rgba(255,255,255,0.08); }
.tray-battery-bar {
  width: 22px; height: 10px;
  border: 1.5px solid rgba(255,255,255,0.35);
  border-radius: 3px; position: relative;
  display: flex; align-items: center; padding: 1.5px;
}
.tray-battery-bar::after {
  content: '';
  position: absolute; right: -4px; top: 50%; transform: translateY(-50%);
  width: 2.5px; height: 5px;
  background: rgba(255,255,255,0.35); border-radius: 0 1px 1px 0;
}
.tray-battery-fill {
  height: 100%; border-radius: 1.5px;
  background: var(--teal);
  transition: width 0.5s, background 0.5s;
}
.tray-wifi-icon { font-size: 0.75rem; }
.tray-wifi-label { font-size: 0.55rem; letter-spacing: 0.06em; }
.tray-time {
  font-family: var(--f-logo);
  font-size: 0.65rem; color: var(--tx);
  cursor: default; text-align: right; line-height: 1.5; letter-spacing: 0.04em;
}

/* ── Fullscreen button ── */
.tb-fs-btn {
  width: 30px; height: 30px; border-radius: 8px;
  background: rgba(255,255,255,0.05); border: 1px solid var(--bdl);
  color: var(--tx2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
  flex-shrink: 0;
}
.tb-fs-btn:hover { background: rgba(255,255,255,0.10); color: var(--tx); }
.tb-fs-btn svg { pointer-events: none; }

/* ════════════════════ WINDOWS ════════════════════ */
.win {
  position: fixed;
  background: var(--panel);
  backdrop-filter: blur(44px); -webkit-backdrop-filter: blur(44px);
  border: 1px solid var(--bd);
  border-radius: var(--r);
  box-shadow: 0 28px 90px rgba(0,0,0,0.72), 0 0 0 0.5px rgba(255,255,255,0.04);
  z-index: 50; overflow: hidden;
  display: flex; flex-direction: column;
  min-width: 320px; min-height: 240px;
  animation: winIn 0.2s ease;
}
@keyframes winIn {
  from { opacity:0; transform: scale(0.97) translateY(8px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}
.win.focused {
  border-color: rgba(196,30,58,0.45);
  box-shadow: 0 28px 90px rgba(0,0,0,0.8), 0 0 0 1px rgba(196,30,58,0.18);
  z-index: 100;
}
.win.minimized { display: none; }
.win.maximized {
  top: 0 !important; left: 0 !important;
  width: 100% !important; height: calc(100vh - var(--bar)) !important;
  border-radius: 0;
}

/* Window Header */
.win-hdr {
  display: flex; align-items: center;
  padding: 9px 12px;
  background: rgba(196,30,58,0.07);
  border-bottom: 1px solid var(--bd);
  cursor: grab; flex-shrink: 0; gap: 10px;
}
.win-hdr:active { cursor: grabbing; }
.win-ico { font-size: 0.95rem; flex-shrink: 0; }
.win-ttl {
  font-family: var(--f-logo);
  font-size: 0.7rem; font-weight: 600; flex: 1;
  letter-spacing: 0.1em; color: var(--tx);
}

/* Window Buttons — minimal flat icon buttons */
.win-btns { display: flex; gap: 4px; flex-shrink: 0; align-items: center; }
.wbtn {
  width: 26px; height: 26px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; border: 1px solid transparent;
  background: transparent;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  flex-shrink: 0;
}
.wbtn:active { transform: scale(0.91); }
.wbtn svg { pointer-events: none; }
.wbtn-min { color: rgba(255,255,255,0.3); }
.wbtn-min:hover { background: rgba(240,165,0,0.12); border-color: rgba(240,165,0,0.35); color: #f0a500; }
.wbtn-max { color: rgba(255,255,255,0.3); }
.wbtn-max:hover { background: rgba(0,200,122,0.12); border-color: rgba(0,200,122,0.35); color: #00c87a; }
.wbtn-cls { color: rgba(255,255,255,0.3); }
.wbtn-cls:hover { background: rgba(232,41,79,0.15); border-color: rgba(232,41,79,0.45); color: #e8294f; }

.win-body { flex: 1; overflow: auto; display: flex; flex-direction: column; }

/* ── Resize handles ── */
.resize-handle {
  position: absolute;
  z-index: 10;
}
.resize-n  { top:-4px;    left:8px;  right:8px;  height:8px; cursor:n-resize; }
.resize-s  { bottom:-4px; left:8px;  right:8px;  height:8px; cursor:s-resize; }
.resize-e  { right:-4px;  top:8px;   bottom:8px; width:8px;  cursor:e-resize; }
.resize-w  { left:-4px;   top:8px;   bottom:8px; width:8px;  cursor:w-resize; }
.resize-ne { top:-4px;    right:-4px; width:14px; height:14px; cursor:ne-resize; }
.resize-nw { top:-4px;    left:-4px;  width:14px; height:14px; cursor:nw-resize; }
.resize-se { bottom:-4px; right:-4px; width:14px; height:14px; cursor:se-resize; }
.resize-sw { bottom:-4px; left:-4px;  width:14px; height:14px; cursor:sw-resize; }

/* ────── Notes App ────── */
.notes-wrap { display: flex; height: 100%; overflow: hidden; }
.notes-side {
  width: 196px; flex-shrink: 0;
  border-right: 1px solid var(--bd);
  display: flex; flex-direction: column;
}
.notes-side-hdr {
  padding: 10px 13px;
  font-family: var(--f-logo);
  font-size: 0.58rem; font-weight: 600;
  color: var(--tx2); letter-spacing: 0.14em; text-transform: uppercase;
  border-bottom: 1px solid var(--bd);
  display: flex; align-items: center; justify-content: space-between;
}
.notes-add-btn {
  background: none; border: none;
  color: var(--cr-hi); font-size: 1.15rem;
  cursor: pointer; padding: 0 3px; line-height: 1;
  transition: color 0.15s;
}
.notes-add-btn:hover { color: #fff; }
.notes-list { flex: 1; overflow-y: auto; }
.n-item {
  padding: 11px 13px; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.15s; border-left: 2px solid transparent;
}
.n-item:hover { background: rgba(255,255,255,0.04); }
.n-item.active { background: rgba(196,30,58,0.13); border-left-color: var(--cr); }
.n-item-t { font-family: var(--f-logo); font-size: 0.72rem; font-weight: 500; margin-bottom: 3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing: 0.04em; }
.n-item-p { font-family: var(--f-logo); font-size: 0.6rem; color: var(--tx2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.notes-editor { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.notes-toolbar {
  padding: 7px 12px; border-bottom: 1px solid var(--bd);
  display: flex; gap: 5px; align-items: center; flex-shrink: 0;
}
.n-tbtn {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--bdl); border-radius: 6px;
  padding: 4px 9px; color: var(--tx);
  font-family: var(--f-logo); font-size: 0.6rem; cursor: pointer; letter-spacing: 0.06em;
  transition: background 0.15s;
}
.n-tbtn:hover { background: rgba(255,255,255,0.10); }
.n-tbtn.danger { border-color: rgba(196,30,58,0.35); color: var(--cr-hi); }
.n-tbtn.danger:hover { background: rgba(196,30,58,0.18); }
.n-title {
  background: none; border: none;
  border-bottom: 1px solid var(--bd);
  padding: 13px 15px; font-size: 0.95rem; font-weight: 600;
  font-family: var(--f-logo); letter-spacing: 0.06em;
  color: var(--tx); outline: none; width: 100%;
  flex-shrink: 0; -webkit-user-select: text; user-select: text;
}
.n-body {
  background: none; border: none;
  padding: 13px 15px; font-size: 0.78rem;
  font-family: var(--f-logo); letter-spacing: 0.04em;
  color: var(--tx); line-height: 1.72;
  outline: none; resize: none; flex: 1; width: 100%;
  -webkit-user-select: text; user-select: text;
}
.notes-empty {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; color: var(--tx2); gap: 8px;
  font-family: var(--f-logo); font-size: 0.7rem; letter-spacing: 0.08em;
}

/* ────── Files App ────── */
.files-wrap { display: flex; height: 100%; overflow: hidden; }
.files-side {
  width: 172px; flex-shrink: 0;
  border-right: 1px solid var(--bd);
  padding: 10px 8px; overflow-y: auto;
}
.fs-section {
  font-family: var(--f-logo);
  font-size: 0.55rem; font-weight: 700;
  color: var(--tx2); letter-spacing: 0.14em; text-transform: uppercase;
  padding: 4px 8px; margin: 10px 0 4px;
}
.fs-item {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 10px; border-radius: 8px;
  cursor: pointer;
  font-family: var(--f-logo); font-size: 0.65rem; letter-spacing: 0.04em;
  transition: background 0.15s;
}
.fs-item:hover { background: rgba(255,255,255,0.06); }
.fs-item.active { background: rgba(196,30,58,0.15); color: var(--cr-hi); }
.files-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.files-crumb {
  padding: 9px 14px;
  font-family: var(--f-logo); font-size: 0.65rem; color: var(--tx2); letter-spacing: 0.06em;
  border-bottom: 1px solid var(--bd);
  display: flex; align-items: center; gap: 5px; flex-shrink: 0;
}
.files-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(84px, 1fr));
  gap: 10px; padding: 14px; align-content: start;
  overflow-y: auto; flex: 1;
}
.f-item {
  display: flex; flex-direction: column;
  align-items: center; gap: 5px;
  padding: 10px 6px; border-radius: 10px;
  cursor: pointer; transition: background 0.15s; text-align: center;
}
.f-item:hover { background: rgba(255,255,255,0.06); }
.f-item.sel { background: rgba(196,30,58,0.15); }
.f-ico { font-size: 2rem; line-height: 1; }
.f-nm { font-family: var(--f-logo); font-size: 0.58rem; color: var(--tx); word-break: break-word; line-height: 1.3; letter-spacing: 0.04em; }

/* ────── Spotify App ────── */
.spotify-wrap { display: flex; flex-direction: column; height: 100%; }
.spotify-hdr {
  padding: 12px 15px; border-bottom: 1px solid var(--bd);
  display: flex; align-items: center; gap: 9px;
  font-family: var(--f-logo); font-size: 0.75rem; font-weight: 600; flex-shrink: 0; letter-spacing: 0.08em;
}
.spotify-embed { flex: 1; border: none; width: 100%; }

/* ────── Google Chrome App ────── */
.chrome-wrap { display: flex; flex-direction: column; height: 100%; }
.chrome-hdr {
  padding: 10px 13px; border-bottom: 1px solid var(--bd);
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}
.chrome-logo { font-size: 1.1rem; }
.chrome-label {
  font-family: var(--f-logo); font-size: 0.65rem; font-weight: 600;
  color: var(--tx); letter-spacing: 0.1em; flex: 1;
}
.chrome-open-btn {
  background: var(--cr); border: none; border-radius: 8px;
  padding: 6px 14px; color: #fff;
  font-family: var(--f-logo); font-size: 0.58rem; font-weight: 600;
  cursor: pointer; letter-spacing: 0.08em;
  transition: background 0.15s;
}
.chrome-open-btn:hover { background: var(--cr-hi); }
.chrome-embed { flex: 1; border: none; width: 100%; background: #fff; }
.chrome-placeholder {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 18px; padding: 32px; color: var(--tx2);
}
.chrome-placeholder .cp-icon { font-size: 4rem; }
.chrome-placeholder h2 {
  font-family: var(--f-logo); color: var(--cr-hi);
  font-size: 1.2rem; letter-spacing: 0.14em;
}
.chrome-placeholder p {
  font-family: var(--f-logo); font-size: 0.65rem;
  text-align: center; line-height: 1.8; letter-spacing: 0.06em; color: var(--tx2);
}

/* ────── Photos App ────── */
.photos-wrap { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
.photos-toolbar {
  padding: 10px 14px; border-bottom: 1px solid var(--bd);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.photos-title {
  font-family: var(--f-logo); font-size: 0.68rem; font-weight: 600;
  color: var(--tx); letter-spacing: 0.12em; flex: 1;
}
.photos-view-btn {
  background: rgba(255,255,255,0.05); border: 1px solid var(--bdl);
  border-radius: 7px; padding: 5px 10px;

  const s = String(d.getSeconds()).padStart(2,'0');
  return secs ? `${h}:${m}:${s}` : `${h}:${m}`;
}
function formatDate(d) {
  return `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`;
}
function tickClock() {
  const d = new Date();
  const lt = document.getElementById('lTime');
  const ld = document.getElementById('lDate');
  if (lt) { lt.textContent = formatTime(d); ld.textContent = formatDate(d); }
  const dt = document.getElementById('dcTime');
  const dd = document.getElementById('dcDate');
  if (dt) { dt.textContent = formatTime(d, true); dd.textContent = formatDate(d); }
  const tr = document.getElementById('trayTime');

function updateBattery() {

    pctEl.textContent = (bat.charging ? '⚡ ' : '') + pct + '%';

    bat.addEventListener('levelchange', updateBattery);

// ── Window Management ────────────────────────────────
let winOffset = 0;

function getStartPos(w, h) {
  const vw = window.innerWidth, vh = window.innerHeight - 54;
  const base = 80 + (winOffset % 6) * 28;
  winOffset++;
  return {
    left: Math.max(20, Math.min(vw - w - 20, base + (winOffset % 3) * 20)),
    top:  Math.max(20, Math.min(vh - h - 20, base))
  };
}

function openApp(id) {
  const app = APPS.find(a => a.id === id);
  if (!app) return;
  closeDrawer();

  if (state.windows[id]) {
    const w = state.windows[id];
    if (w.minimized) { w.el.classList.remove('minimized'); w.minimized = false; }
    focusWin(id);
    updateDock();
    return;
  }

  const pos = getStartPos(app.w, app.h);
  const el = document.createElement('div');
  el.className = 'win focused';
  el.id = 'win-' + id;
  el.style.cssText = `width:${app.w}px;height:${app.h}px;left:${pos.left}px;top:${pos.top}px;`;

  el.innerHTML = `
    <div class="win-hdr" id="hdr-${id}">
      <span class="win-ico">${app.ico}</span>
      <span class="win-ttl">${app.name}</span>
      <div class="win-btns">
        <button class="wbtn wbtn-min" title="Minimize" onclick="minimizeWin('${id}')">
          <svg width="10" height="2" viewBox="0 0 10 2" fill="none"><rect width="10" height="2" rx="1" fill="currentColor"/></svg>
        </button>
        <button class="wbtn wbtn-max" title="Maximize" id="maxbtn-${id}" onclick="toggleMax('${id}')">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="0.75" y="0.75" width="8.5" height="8.5" rx="2" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        <button class="wbtn wbtn-cls" title="Close" onclick="closeWin('${id}')">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1.5 1.5l7 7M8.5 1.5l-7 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
    <div class="win-body" id="body-${id}"></div>
    <!-- Resize Handles -->
    <div class="resize-handle resize-n"  data-dir="n"  data-win="${id}"></div>
    <div class="resize-handle resize-s"  data-dir="s"  data-win="${id}"></div>
    <div class="resize-handle resize-e"  data-dir="e"  data-win="${id}"></div>
    <div class="resize-handle resize-w"  data-dir="w"  data-win="${id}"></div>
    <div class="resize-handle resize-ne" data-dir="ne" data-win="${id}"></div>
    <div class="resize-handle resize-nw" data-dir="nw" data-win="${id}"></div>
    <div class="resize-handle resize-se" data-dir="se" data-win="${id}"></div>
    <div class="resize-handle resize-sw" data-dir="sw" data-win="${id}"></div>
  `;

  document.getElementById('desktop').appendChild(el);
  state.windows[id] = { el, minimized: false, maximized: false, prevPos: null };

  renderAppContent(id);
  makeDraggable(el, document.getElementById('hdr-' + id), id);
  makeResizable(el, id);
  focusWin(id);
  updateDock();
}

function focusWin(id) {
  Object.values(state.windows).forEach(w => w.el.classList.remove('focused'));
  const w = state.windows[id];
  if (w) {
    state.zTop++;
    w.el.style.zIndex = state.zTop;
    w.el.classList.add('focused');
  }
  updateDock();
}

function closeWin(id) {
  const w = state.windows[id];
  if (!w) return;
  w.el.remove();
  delete state.windows[id];
  updateDock();
}

function minimizeWin(id) {
  const w = state.windows[id];
  if (!w) return;
  w.el.classList.add('minimized');
  w.minimized = true;
  updateDock();
}

function toggleMax(id) {
  const w = state.windows[id];
  if (!w) return;
  if (!w.maximized) {
    w.prevPos = { left: w.el.style.left, top: w.el.style.top, width: w.el.style.width, height: w.el.style.height };
    w.el.classList.add('maximized');
    w.maximized = true;
  } else {
    w.el.classList.remove('maximized');
    Object.assign(w.el.style, w.prevPos);
    w.maximized = false;
  }
  focusWin(id);
}

// ── Dragging ─────────────────────────────────────────
function makeDraggable(win, header, id) {
  let ox, oy, dragging = false;

  function startDrag(cx, cy) {
    const w = state.windows[id];
    if (w && w.maximized) return;
    if (isTablet()) return; // windows are fullscreen on tablet/mobile — no drag needed
    dragging = true;
    ox = cx - win.offsetLeft;
    oy = cy - win.offsetTop;
    focusWin(id);
  }
  function onDrag(cx, cy) {
    if (!dragging) return;
    const vw = window.innerWidth, vh = window.innerHeight - 54;
    const nw = win.offsetWidth, nh = win.offsetHeight;
    win.style.left = Math.max(0, Math.min(vw - nw, cx - ox)) + 'px';
    win.style.top  = Math.max(0, Math.min(vh - nh, cy - oy)) + 'px';
  }
  function endDrag() { dragging = false; }

  // Mouse
  header.addEventListener('mousedown', e => {
    if (e.target.closest('.win-btns')) return;
    startDrag(e.clientX, e.clientY);
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => onDrag(e.clientX, e.clientY));
  document.addEventListener('mouseup', endDrag);

  // Touch (for tablet where windows can theoretically move)
  header.addEventListener('touchstart', e => {
    if (e.target.closest('.win-btns')) return;
    const t = e.touches[0];
    startDrag(t.clientX, t.clientY);
  }, { passive: true });
  header.addEventListener('touchmove', e => {
    const t = e.touches[0];
    onDrag(t.clientX, t.clientY);
    if (dragging) e.preventDefault();
  }, { passive: false });
  header.addEventListener('touchend', endDrag);

  win.addEventListener('mousedown', () => focusWin(id));
}

// ── Resizing (all 8 directions) ───────────────────────
function makeResizable(win, id) {
  const handles = win.querySelectorAll('.resize-handle');
  handles.forEach(handle => {
    handle.addEventListener('mousedown', e => {
      e.preventDefault();
      e.stopPropagation();
      const w = state.windows[id];
      if (w && w.maximized) return;
      focusWin(id);

      const dir   = handle.dataset.dir;
      const startX = e.clientX, startY = e.clientY;
      const startW = win.offsetWidth, startH = win.offsetHeight;
      const startL = win.offsetLeft,  startT = win.offsetTop;
      const minW = 320, minH = 240;

      function onMove(e) {
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        let nl = startL, nt = startT, nw = startW, nh = startH;

        if (dir.includes('e'))  nw = Math.max(minW, startW + dx);
        if (dir.includes('s'))  nh = Math.max(minH, startH + dy);
        if (dir.includes('w')) { nw = Math.max(minW, startW - dx); if (nw > minW) nl = startL + dx; }
        if (dir.includes('n')) { nh = Math.max(minH, startH - dy); if (nh > minH) nt = startT + dy; }

        win.style.left   = nl + 'px';
        win.style.top    = nt + 'px';
        win.style.width  = nw + 'px';
        win.style.height = nh + 'px';
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

// ── Taskbar Dock ─────────────────────────────────────
function buildDock() {
  const dock = document.getElementById('tbDock');
  dock.innerHTML = '';
  APPS.forEach(app => {
    const btn = document.createElement('div');
    btn.className = 'dock-btn';
    btn.id = 'dock-' + app.id;
    // Icon: custom image if imgSrc is set, otherwise emoji
    const iconHTML = app.imgSrc
      /* ── If imgSrc is set, renders your custom image ── */
      ? `<img src="${app.imgSrc}" alt="${app.name}">`
      : `<span class="dock-icon-emoji">${app.ico}</span>`;
    btn.innerHTML = `${iconHTML}<div class="dock-tip">${app.name}</div>`;
    btn.title = app.name;
    btn.addEventListener('click', () => {
      const w = state.windows[app.id];
      if (!w) { openApp(app.id); return; }
      if (w.minimized) { w.el.classList.remove('minimized'); w.minimized = false; focusWin(app.id); }
      else if (w.el.classList.contains('focused')) { minimizeWin(app.id); }
      else { focusWin(app.id); }
      updateDock();
    });
    dock.appendChild(btn);
  });
}

function updateDock() {
  APPS.forEach(app => {
    const btn = document.getElementById('dock-' + app.id);
    if (!btn) return;
    const w = state.windows[app.id];
    btn.classList.toggle('active', !!w && !w.minimized);
  });
}

function getFSNode(path) {
  let node = FS;
  for (const seg of path) {
    if (node[seg]) node = node[seg];
    else if (node.children && node.children[seg]) node = node.children[seg];
    else return null;
  }
  return node;
}

  body.innerHTML = `
    <div class="photos-wrap">
      <div class="photos-toolbar">
        <span class="photos-title">🖼️ &nbsp;My Photos</span>
        <button class="photos-view-btn active" id="pv-grid" onclick="setPhotosView('grid')">Grid</button>
        <button class="photos-view-btn" id="pv-list" onclick="setPhotosView('list')">List</button>
      </div>
      <div class="photos-grid" id="photos-grid"></div>
    </div>`;
  renderPhotoGrid();
}

function setPhotosView(v) {
  state.photosView = v;
  const grid = document.getElementById('photos-grid');
  if (!grid) return;
  grid.classList.toggle('list-view', v === 'list');
  document.getElementById('pv-grid').classList.toggle('active', v === 'grid');
  document.getElementById('pv-list').classList.toggle('active', v === 'list');
  renderPhotoGrid();
}

function renderPhotoGrid() {
  const grid = document.getElementById('photos-grid');
  if (!grid) return;
  if (PHOTOS.length === 0) {
    grid.innerHTML = `<div class="photo-empty"><span style="font-size:3rem">🖼️</span><span>No photos yet — add some in the PHOTOS array!</span></div>`;
    return;
  }
  const isList = state.photosView === 'list';
  grid.innerHTML = PHOTOS.map((p, i) => `
    <div class="photo-item${isList ? ' list-view' : ''}" onclick="openLightbox(${i})">
      <img src="${p.src}" alt="${p.name}" loading="lazy" />
      <div class="photo-caption${isList ? ' list-caption' : ''}">${p.name}</div>
    </div>`).join('');
}

function openLightbox(idx) {
  state.lightboxIndex = idx;
  const lb = document.createElement('div');
  lb.className = 'photo-lightbox';
  lb.id = 'lightbox';
  lb.innerHTML = `
    <button class="lb-close" onclick="closeLightbox()">✕</button>
    <button class="lb-nav lb-prev" onclick="lbNav(-1)">‹</button>
    <img id="lb-img" src="${PHOTOS[idx].src}" alt="${PHOTOS[idx].name}" />
    <button class="lb-nav lb-next" onclick="lbNav(1)">›</button>
    <div class="lb-caption" id="lb-cap">${PHOTOS[idx].name} &nbsp;·&nbsp; ${idx+1} / ${PHOTOS.length}</div>`;
  document.body.appendChild(lb);
  lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });

  // Touch swipe for lightbox navigation
  let lbTx;
  lb.addEventListener('touchstart', e=>{ lbTx = e.touches[0].clientX; }, {passive:true});
  lb.addEventListener('touchend', e=>{
    const dx = e.changedTouches[0].clientX - lbTx;
    if(Math.abs(dx) > 40) lbNav(dx < 0 ? 1 : -1);
  }, {passive:true});
}

function lbNav(dir) {
  state.lightboxIndex = (state.lightboxIndex + dir + PHOTOS.length) % PHOTOS.length;
  const idx = state.lightboxIndex;
  const img = document.getElementById('lb-img');
  const cap = document.getElementById('lb-cap');
  if (img) img.src = PHOTOS[idx].src;
  if (cap) cap.textContent = `${PHOTOS[idx].name} · ${idx+1} / ${PHOTOS.length}`;
}
function closeLightbox() {
  const lb = document.getElementById('lightbox');
  if (lb) lb.remove();
}
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox')) return;
  if (e.key === 'ArrowLeft')  lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'Escape')     closeLightbox();
});

// ─────── TETRIS ───────────────────────────────────────
function initTetris() {
  const wrap = document.getElementById('game-canvas-wrap');
  const C = 10, R = 20, SZ = 22;
  wrap.innerHTML = `
    <div style="display:flex;gap:16px;align-items:flex-start;padding:12px">
      <canvas id="tc" width="${C*SZ}" height="${R*SZ}" style="border:1px solid rgba(196,30,58,0.3);border-radius:4px"></canvas>
      <div style="color:var(--tx2);font-family:var(--f-logo);font-size:0.58rem;letter-spacing:0.06em;line-height:2.2">
        <div style="color:var(--tx);font-size:0.65rem;margin-bottom:8px">CONTROLS</div>
        ← → &nbsp; Move<br>↑ &nbsp;&nbsp;&nbsp;&nbsp; Rotate<br>↓ &nbsp;&nbsp;&nbsp;&nbsp; Soft drop<br>Space &nbsp;Hard drop
      </div>
    </div>`;
  const canvas = document.getElementById('tc');
  const ctx = canvas.getContext('2d');

  const COLORS = ['','#e8294f','#f0a500','#00c87a','#4488ff','#aa44ff','#ff44aa','#44ffee'];
  const PIECES = [
    [[1,1,1,1]],
    [[2,2],[2,2]],
    [[0,3,0],[3,3,3]],
    [[4,0],[4,0],[4,4]],
    [[0,5],[0,5],[5,5]],
    [[6,6,0],[0,6,6]],
    [[0,7,7],[7,7,0]]
  ];

  let board = Array.from({length:R}, ()=>Array(C).fill(0));
  let score = 0, gameOver = false;
  let cur, cx, cy;

  function newPiece() {
    const idx = Math.floor(Math.random()*PIECES.length);
    cur = PIECES[idx].map(r=>[...r]);
    cx = Math.floor((C-cur[0].length)/2);
    cy = 0;
    if (!valid(cur,cx,cy)) { gameOver = true; draw(); }
  }

  function valid(p,x,y) {
    for (let r=0;r<p.length;r++)
      for (let c=0;c<p[r].length;c++)
        if (p[r][c] && (y+r<0||y+r>=R||x+c<0||x+c>=C||board[y+r][x+c]))
          return false;
    return true;
  }

  function place() {
    for (let r=0;r<cur.length;r++)
      for (let c=0;c<cur[r].length;c++)
        if (cur[r][c]) board[cy+r][cx+c]=cur[r][c];
    let lines=0;
    board=board.filter(row=>{if(row.every(v=>v)){lines++;return false;}return true;});
    while(board.length<R) board.unshift(Array(C).fill(0));
    score += [0,100,300,500,800][lines]||0;
    setScore(score);
    newPiece();
  }

  function rotate(p) {
    return p[0].map((_,i)=>p.map(r=>r[i]).reverse());
  }

  function draw() {
    ctx.fillStyle='#050508'; ctx.fillRect(0,0,C*SZ,R*SZ);
    // grid
    ctx.strokeStyle='rgba(255,255,255,0.04)';
    for(let r=0;r<R;r++) for(let c=0;c<C;c++){ctx.strokeRect(c*SZ,r*SZ,SZ,SZ);}
    // board
    for(let r=0;r<R;r++) for(let c=0;c<C;c++) if(board[r][c]){
      ctx.fillStyle=COLORS[board[r][c]];ctx.fillRect(c*SZ+1,r*SZ+1,SZ-2,SZ-2);
    }
    // piece
    if(cur && !gameOver) {
      for(let r=0;r<cur.length;r++) for(let c=0;c<cur[r].length;c++) if(cur[r][c]){
        ctx.fillStyle=COLORS[cur[r][c]];ctx.fillRect((cx+c)*SZ+1,(cy+r)*SZ+1,SZ-2,SZ-2);
      }
    }
    if(gameOver){
      ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,C*SZ,R*SZ);
      ctx.fillStyle='#e8294f';ctx.font='bold 16px Cinzel,serif';
      ctx.textAlign='center';ctx.fillText('GAME OVER',C*SZ/2,R*SZ/2-10);
      ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='11px Cinzel,serif';
      ctx.fillText('Press R to restart',C*SZ/2,R*SZ/2+14);
    }
  }

  newPiece();
  const tid = setInterval(()=>{
    if(gameOver) return;
    if(valid(cur,cx,cy+1)) cy++;
    else place();
    draw();
  },500);
  gameLoops.push(tid);
  draw();

  canvas.setAttribute('tabindex','0'); canvas.focus();
  canvas.addEventListener('keydown', e=>{
    if(gameOver){ if(e.key==='r'||e.key==='R'){ initTetris(); return; } return; }
    if(e.key==='ArrowLeft' && valid(cur,cx-1,cy)) cx--;
    if(e.key==='ArrowRight' && valid(cur,cx+1,cy)) cx++;
    if(e.key==='ArrowDown' && valid(cur,cx,cy+1)) cy++;
    if(e.key==='ArrowUp'){const rot=rotate(cur);if(valid(rot,cx,cy))cur=rot;}
    if(e.key===' '){while(valid(cur,cx,cy+1))cy++;place();}
    draw(); e.preventDefault();
  });

  // Touch swipe for Tetris
  let ttx, tty;
  canvas.addEventListener('touchstart', e=>{ttx=e.touches[0].clientX;tty=e.touches[0].clientY;},{passive:true});
  canvas.addEventListener('touchend', e=>{
    if(gameOver){initTetris();return;}
    const dx=e.changedTouches[0].clientX-ttx, dy=e.changedTouches[0].clientY-tty;
    const adx=Math.abs(dx), ady=Math.abs(dy);
    if(adx<10&&ady<10){const rot=rotate(cur);if(valid(rot,cx,cy))cur=rot;draw();return;}
    if(adx>ady){if(dx>0&&valid(cur,cx+1,cy))cx++;else if(dx<0&&valid(cur,cx-1,cy))cx--;}
    else{if(dy>0){while(valid(cur,cx,cy+1))cy++;place();}else{const rot=rotate(cur);if(valid(rot,cx,cy))cur=rot;}}
    draw();
  },{passive:true});
}

// ─────── 2048 ─────────────────────────────────────────
function init2048() {
  const wrap = document.getElementById('game-canvas-wrap');
  wrap.innerHTML = `
    <div id="g2048" style="padding:16px;display:flex;flex-direction:column;align-items:center;gap:12px;width:100%">
      <div style="font-family:var(--f-logo);font-size:0.58rem;color:var(--tx2);letter-spacing:0.08em">Arrow keys or swipe to merge tiles</div>
      <div id="g2048-board" style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;background:rgba(196,30,58,0.1);padding:8px;border-radius:10px;width:min(280px,80%)"></div>
    </div>`;
  let board = Array.from({length:4},()=>Array(4).fill(0));
  let score = 0;

  function addRandom() {
    const empty=[];
    board.forEach((r,ri)=>r.forEach((v,ci)=>{if(!v)empty.push([ri,ci]);}));
    if(!empty.length) return;
    const [r,c]=empty[Math.floor(Math.random()*empty.length)];
    board[r][c]=Math.random()<0.9?2:4;
  }

  function slide(row) {
    let r=row.filter(v=>v); let added=false;
    for(let i=0;i<r.length-1;i++) if(r[i]===r[i+1]&&!added){r[i]*=2;score+=r[i];r.splice(i+1,1);added=true;}
    while(r.length<4) r.push(0);
    return r;
  }

  function move(dir) {
    let moved=false;
    const prev=JSON.stringify(board);
    if(dir==='left')  board=board.map(r=>slide(r));
    if(dir==='right') board=board.map(r=>slide([...r].reverse()).reverse());
    if(dir==='up'){
      for(let c=0;c<4;c++){let col=board.map(r=>r[c]);col=slide(col);board.forEach((r,ri)=>r[c]=col[ri]);}
    }
    if(dir==='down'){
      for(let c=0;c<4;c++){let col=board.map(r=>r[c]).reverse();col=slide(col).reverse();board.forEach((r,ri)=>r[c]=col[ri]);}
    }
    if(JSON.stringify(board)!==prev){moved=true;addRandom();}
    setScore(score); render2048();
    return moved;
  }

  const TILE_COLORS = {0:'rgba(255,255,255,0.04)',2:'#eee4da',4:'#ede0c8',8:'#f2b179',16:'#f59563',32:'#f67c5f',64:'#f65e3b',128:'#edcf72',256:'#edcc61',512:'#edc850',1024:'#edc53f',2048:'#edc22e'};

  function render2048() {
    const bd = document.getElementById('g2048-board');
    if(!bd) return;
    bd.innerHTML = board.flat().map(v=>`
      <div style="
        aspect-ratio:1;display:flex;align-items:center;justify-content:center;
        background:${TILE_COLORS[v]||'#3c3a32'};border-radius:6px;
        font-family:Cinzel,serif;font-weight:700;font-size:${v>999?'0.85rem':v>99?'1rem':'1.2rem'};
        color:${v<=4?'#776e65':'#f9f6f2'};
        transition:background 0.1s;
      ">${v||''}</div>`).join('');
  }

  addRandom(); addRandom(); render2048();

  const g2 = document.getElementById('g2048');
  g2.setAttribute('tabindex','0');
  g2.focus();
  g2.addEventListener('keydown', e=>{
    const map={'ArrowLeft':'left','ArrowRight':'right','ArrowUp':'up','ArrowDown':'down'};
    if(map[e.key]){move(map[e.key]);e.preventDefault();}
  });

  // Touch swipe support
  let t2x, t2y;
  g2.addEventListener('touchstart', e=>{t2x=e.touches[0].clientX;t2y=e.touches[0].clientY;},{passive:true});
  g2.addEventListener('touchend', e=>{
    const dx=e.changedTouches[0].clientX-t2x, dy=e.changedTouches[0].clientY-t2y;
    if(Math.max(Math.abs(dx),Math.abs(dy))<20) return;
    if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
    else move(dy>0?'down':'up');
  },{passive:true});
}

// ─────── SNAKE ────────────────────────────────────────
function initSnake() {
  const wrap = document.getElementById('game-canvas-wrap');
  const W=400,H=400,G=20,SZ=W/G;
  wrap.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px">
      <canvas id="sc" width="${W}" height="${H}" style="border:1px solid rgba(196,30,58,0.3);border-radius:4px;max-width:calc(100vw - 24px);max-height:calc(100vw - 24px)"></canvas>
      <div style="color:var(--tx2);font-family:var(--f-logo);font-size:0.55rem;letter-spacing:0.06em">Arrow keys to move · R to restart</div>
      <!-- Touch D-pad -->
      <div class="touch-dpad" id="snake-dpad">
        <div></div>
        <button class="dpad-btn" id="dp-up">▲</button>
        <div></div>
        <button class="dpad-btn" id="dp-left">◄</button>
        <button class="dpad-btn" id="dp-down">▼</button>
        <button class="dpad-btn" id="dp-right">►</button>
      </div>
    </div>`;
  const canvas=document.getElementById('sc');
  const ctx=canvas.getContext('2d');
  let snake=[{x:10,y:10}],dir={x:1,y:0},ndir={x:1,y:0},food,score=0,over=false;

  function randFood(){
    do{food={x:Math.floor(Math.random()*G),y:Math.floor(Math.random()*G)};}
    while(snake.some(s=>s.x===food.x&&s.y===food.y));
  }
  randFood();

  function draw(){
    ctx.fillStyle='#050508';ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(255,255,255,0.03)';
    for(let i=0;i<G;i++){ctx.beginPath();ctx.moveTo(i*SZ,0);ctx.lineTo(i*SZ,H);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*SZ);ctx.lineTo(W,i*SZ);ctx.stroke();}
    // food
    ctx.fillStyle='#e8294f';ctx.beginPath();ctx.arc(food.x*SZ+SZ/2,food.y*SZ+SZ/2,SZ/2-2,0,Math.PI*2);ctx.fill();
    // snake
    snake.forEach((s,i)=>{
      ctx.fillStyle=i===0?'#00c87a':'#008855';
      ctx.fillRect(s.x*SZ+1,s.y*SZ+1,SZ-2,SZ-2);
    });
    if(over){
      ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#e8294f';ctx.font='bold 18px Cinzel,serif';ctx.textAlign='center';
      ctx.fillText('GAME OVER',W/2,H/2-10);
      ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='11px Cinzel,serif';
      ctx.fillText('Press R to restart',W/2,H/2+14);
    }
  }

  const sid=setInterval(()=>{
    if(over) return;
    dir={...ndir};
    const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
    if(head.x<0||head.x>=G||head.y<0||head.y>=G||snake.some(s=>s.x===head.x&&s.y===head.y)){over=true;draw();return;}
    snake.unshift(head);
    if(head.x===food.x&&head.y===food.y){score+=10;setScore(score);randFood();}
    else snake.pop();
    draw();
  },120);
  gameLoops.push(sid);
  draw();

  // Keyboard
  canvas.setAttribute('tabindex','0');canvas.focus();
  canvas.addEventListener('keydown',e=>{
    if(e.key==='r'||e.key==='R'){clearInterval(sid);initSnake();return;}
    if(e.key==='ArrowUp'    &&dir.y!==1)  ndir={x:0,y:-1};
    if(e.key==='ArrowDown'  &&dir.y!==-1) ndir={x:0,y:1};
    if(e.key==='ArrowLeft'  &&dir.x!==1)  ndir={x:-1,y:0};
    if(e.key==='ArrowRight' &&dir.x!==-1) ndir={x:1,y:0};
    e.preventDefault();
  });

  // Touch D-pad buttons
  function dpadDir(d) {
    if(over){clearInterval(sid);initSnake();return;}
    if(d==='up'    &&dir.y!==1)  ndir={x:0,y:-1};
    if(d==='down'  &&dir.y!==-1) ndir={x:0,y:1};
    if(d==='left'  &&dir.x!==1)  ndir={x:-1,y:0};
    if(d==='right' &&dir.x!==-1) ndir={x:1,y:0};
  }
  ['up','down','left','right'].forEach(d=>{
    const btn=document.getElementById('dp-'+d);
    if(btn){
      btn.addEventListener('touchstart',e=>{dpadDir(d);e.preventDefault();},{passive:false});
      btn.addEventListener('click',()=>dpadDir(d));
    }
  });

  // Swipe on canvas
  let tx0,ty0;
  canvas.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;},{passive:true});
  canvas.addEventListener('touchend',e=>{
    if(over){clearInterval(sid);initSnake();return;}
    const dx=e.changedTouches[0].clientX-tx0, dy=e.changedTouches[0].clientY-ty0;
    if(Math.max(Math.abs(dx),Math.abs(dy))<18) return;
    if(Math.abs(dx)>Math.abs(dy)){if(dx>0&&dir.x!==-1)ndir={x:1,y:0};else if(dx<0&&dir.x!==1)ndir={x:-1,y:0};}
    else{if(dy>0&&dir.y!==-1)ndir={x:0,y:1};else if(dy<0&&dir.y!==1)ndir={x:0,y:-1};}
  },{passive:true});
}

// ─────── TIC-TAC-TOE ──────────────────────────────────
function initTicTacToe() {
  const wrap = document.getElementById('game-canvas-wrap');
  wrap.innerHTML = `
    <div id="ttt" style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:20px">
      <div id="ttt-status" style="font-family:var(--f-logo);font-size:0.68rem;color:var(--tx);letter-spacing:0.1em">Player X's Turn</div>
      <div id="ttt-board" style="display:grid;grid-template-columns:repeat(3,80px);grid-template-rows:repeat(3,80px);gap:6px"></div>
      <button onclick="initTicTacToe()" style="background:rgba(196,30,58,0.15);border:1px solid var(--cr-dim);border-radius:8px;padding:7px 18px;color:var(--cr-hi);font-family:var(--f-logo);font-size:0.58rem;letter-spacing:0.08em;cursor:pointer">New Game</button>
    </div>`;
  let cells=Array(9).fill(''), turn='X', over=false;

  function render(){
    const bd=document.getElementById('ttt-board');
    if(!bd) return;
    bd.innerHTML=cells.map((v,i)=>`
      <div onclick="tttClick(${i})" style="
        background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
        border-radius:10px;display:flex;align-items:center;justify-content:center;
        font-size:2rem;cursor:pointer;transition:background 0.15s;
        color:${v==='X'?'var(--cr-hi)':'var(--teal)'};
        ${v?'pointer-events:none':''}
      ">${v}</div>`).join('');
  }

  window.tttClick=function(i){
    if(over||cells[i]) return;
    cells[i]=turn;
    const w=checkWin();
    const st=document.getElementById('ttt-status');
    if(w){over=true;if(st)st.textContent=`Player ${turn} Wins! 🎉`;setScore(turn==='X'?1:0);}
    else if(cells.every(v=>v)){over=true;if(st)st.textContent='Draw!';}
    else{turn=turn==='X'?'O':'X';if(st)st.textContent=`Player ${turn}'s Turn`;}
    render();
  };

  function checkWin(){
    const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    return wins.some(([a,b,c])=>cells[a]&&cells[a]===cells[b]&&cells[b]===cells[c]);
  }
  render();
}

// ─────── FLAPPY BIRD ──────────────────────────────────
function initFlappy() {
  const wrap = document.getElementById('game-canvas-wrap');
  const W=320,H=480;
  wrap.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px">
      <canvas id="fc" width="${W}" height="${H}" style="border:1px solid rgba(196,30,58,0.3);border-radius:4px;cursor:pointer"></canvas>
      <div style="color:var(--tx2);font-family:var(--f-logo);font-size:0.55rem;letter-spacing:0.06em">Click or Space to flap</div>
    </div>`;
  const canvas=document.getElementById('fc');
  const ctx=canvas.getContext('2d');

  const GRAVITY=0.35,FLAP=-7,PIPE_W=48,GAP=130,PIPE_SPEED=2.2;
  let bird={x:80,y:H/2,v:0},pipes=[],score=0,over=false,started=false,raf;

  function addPipe(){
    const top=60+Math.random()*(H-GAP-120);
    pipes.push({x:W,top,scored:false});
  }
  addPipe();

  function flap(){
    if(over){initFlappy();return;}
    started=true; bird.v=FLAP;
  }

  canvas.addEventListener('click',flap);
  canvas.setAttribute('tabindex','0');canvas.focus();
  canvas.addEventListener('keydown',e=>{if(e.key===' '||e.key==='ArrowUp'){flap();e.preventDefault();}});

  function draw(){
    // Sky
    const grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'#1a0525');grad.addColorStop(1,'#0a1a3a');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    // Ground
    ctx.fillStyle='#2a1a0a';ctx.fillRect(0,H-40,W,40);
    ctx.fillStyle='#3a2a1a';ctx.fillRect(0,H-42,W,4);
    // Pipes
    pipes.forEach(p=>{
      ctx.fillStyle='#00c87a';
      ctx.fillRect(p.x,0,PIPE_W,p.top);
      ctx.fillRect(p.x,p.top+GAP,PIPE_W,H);
      ctx.fillStyle='#00a060';
      ctx.fillRect(p.x-3,p.top-18,PIPE_W+6,20);
      ctx.fillRect(p.x-3,p.top+GAP,PIPE_W+6,20);
    });
    // Bird
    ctx.save();ctx.translate(bird.x,bird.y);
    ctx.rotate(Math.min(Math.max(bird.v*0.06,-0.5),1));
    ctx.fillStyle='#f0a500';
    ctx.beginPath();ctx.ellipse(0,0,13,10,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(6,-2,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(8,-2,2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#e8294f';ctx.beginPath();ctx.moveTo(12,1);ctx.lineTo(18,1);ctx.lineTo(12,4);ctx.fill();
    ctx.restore();

    if(!started){
      ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='14px Cinzel,serif';ctx.textAlign='center';
      ctx.fillText('Click to Start',W/2,H/2+40);
    }
    if(over){
      ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#e8294f';ctx.font='bold 22px Cinzel,serif';ctx.textAlign='center';
      ctx.fillText('GAME OVER',W/2,H/2-14);
      ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='13px Cinzel,serif';
      ctx.fillText(`Score: ${score}`,W/2,H/2+14);
      ctx.fillText('Click to Restart',W/2,H/2+36);
    }
  }

  function loop(){
    if(!over && started){
      bird.v+=GRAVITY; bird.y+=bird.v;
      // collision ground/ceiling
      if(bird.y>H-50||bird.y<0){over=true;}
      pipes.forEach(p=>{
        p.x-=PIPE_SPEED;
        if(!p.scored&&p.x+PIPE_W<bird.x){p.scored=true;score++;setScore(score);}
        if(bird.x+10>p.x&&bird.x-10<p.x+PIPE_W){
          if(bird.y-8<p.top||bird.y+8>p.top+GAP) over=true;
        }
      });
      if(pipes[pipes.length-1].x<W-220) addPipe();
      pipes=pipes.filter(p=>p.x>-PIPE_W-10);
    }
    draw();
    if(!over) raf=requestAnimationFrame(loop);
  }
  raf=requestAnimationFrame(loop);
  gameLoops.push(raf);
}

buildDock();
buildDrawer();
</script>
